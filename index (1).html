          <button className="modal-btn-close" onClick={onClose}>닫기</button>
          <button className="modal-btn-confirm" onClick={onConfirm}>이 각오로 나아가겠소</button>
        </div>
      </div>
    </div>
  );
}

   INTRO

/* ─────────────────────────────────────────────
   QUESTION
───────────────────────────────────────────── */
function QuestionStep({ qIndex, question, answers, onAnswer, onNext, onPrev }) {
  const [selected, setSelected] = useState(answers[question.id] ?? null);
  const [popup, setPopup] = useState(null); // opt object when open
  const progress = (qIndex / QUESTIONS.length) * 100;
  const isLast = qIndex === QUESTIONS.length - 1;

  // re-sync if navigating back
  useEffect(() => {
    setSelected(answers[question.id] ?? null);
  }, [question.id]);

  const handleSelect = (idx) => {
    // open popup immediately on click
    setPopup({ idx, opt: question.options[idx] });
  };

  const handleConfirm = () => {
    const idx = popup.idx;
    setSelected(idx);
    onAnswer(question.id, idx);
    setPopup(null);
  };

  const handleClosePopup = () => {
    setPopup(null);
  };

  return (
    <div style={{ fontFamily:font }}>
      {/* Popup modal */}
      {popup && (
        <EchoPopup
          opt={popup.opt}
          onConfirm={handleConfirm}
          onClose={handleClosePopup}
        />
      )}

      {/* Scene header */}
      <div style={{
        background:"#1a0800", padding:"1.8rem 2.5rem 1.5rem",
        position:"relative", overflow:"hidden",
      }}>
        <div style={{
          position:"absolute", inset:0, pointerEvents:"none",
          backgroundImage:"repeating-linear-gradient(135deg,transparent,transparent 16px,rgba(139,26,26,0.05) 16px,rgba(139,26,26,0.05) 17px)",
        }} />
        <div style={{ position:"relative", zIndex:1 }}>
          <div style={{ fontSize:10, color:"#c9a96e", letterSpacing:5, marginBottom:8 }}>
            장면 {qIndex + 1} / {QUESTIONS.length}
          </div>
          <div style={{ fontSize:15, fontWeight:700, color:"#f5ead0", letterSpacing:1, lineHeight:1.7 }}>
            {question.scene}
          </div>
        </div>
      </div>

      {/* Progress bar */}
      <div className="progress-wrap">
        <div className="progress-fill" style={{ width:`${progress}%` }} />
      </div>

      <div style={{ padding:"2rem 2.5rem 2.5rem", position:"relative" }}>
        <div className="paper-lines" />
        <div style={{ position:"relative", zIndex:1 }}>

          {/* Situation */}
          <div className="fade-up" style={{
            fontSize:14, color:"#2a0e00", lineHeight:2.1, marginBottom:"1.5rem",
            padding:"1rem 1.2rem",
            background:"rgba(139,105,20,0.07)", borderLeft:"3px solid #c9a96e",
          }}>
            {question.situation}
          </div>

          {/* Question */}
          <div className="fu1" style={{
            fontSize:19, fontWeight:900, color:"#1a0800",
            marginBottom:"1.2rem", letterSpacing:1, lineHeight:1.6,
          }}>
            {question.question}
          </div>

          {/* Options */}
          <div className="fu2">
            {question.options.map((opt, i) => (
              <div
                key={i}
                className={`option-row${selected === i ? " sel" : ""}`}
                onClick={() => handleSelect(i)}
              >
                <input
                  type="radio"
                  readOnly
                  checked={selected === i}
                  style={{ marginTop:3, accentColor:"#8b1a1a", flexShrink:0 }}
                />
                <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"space-between", gap:10 }}>
                  <div style={{ fontSize:14, color:"#1a0800", lineHeight:1.8 }}>{opt.text}</div>
                  {selected === i && (
                    <span className="weight-tag" style={{
                      background: WEIGHT_COLOR[opt.weight] || "#8b1a1a",
                      fontSize:10, letterSpacing:3, flexShrink:0,
                    }}>
                      {opt.weight}
                    </span>
                  )}
                </div>
              </div>
            ))}
          </div>

          {/* Navigation */}
          <div style={{
            display:"flex", justifyContent:"space-between", alignItems:"center",
            marginTop:"2rem", paddingTop:"1.2rem", borderTop:"1px solid #c9a96e",
          }}>
            {qIndex > 0
              ? <button className="btn-g" onClick={onPrev}>← 이전 장면</button>
              : <div />}
            <button
              className="btn-d"
              onClick={onNext}
              disabled={selected === null}
            >
              {isLast ? "각오를 제출하겠소" : "다음 장면으로 →"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   LOADING
───────────────────────────────────────────── */

}

/* ─────────────────────────────────────────────
   RESULT
───────────────────────────────────────────── */
function ResultStep({ answers, onReset }) {
  const weights = QUESTIONS.map(q => {
    const idx = answers[q.id];
    return (idx !== null && idx !== undefined) ? q.options[idx].weight : null;
  }).filter(Boolean);

  const weightCount = {};
  weights.forEach(w => { weightCount[w] = (weightCount[w] || 0) + 1; });
  const topWeight = Object.entries(weightCount).sort((a,b) => b[1]-a[1])[0]?.[0] || "결의";
  const character = CHARACTER_MAP[topWeight] || CHARACTER_MAP["결의"];

  return (
    <div style={{ fontFamily:font }}>
      {/* Hero */}
      <div style={{
        background:"#1a0800", padding:"2.5rem 2.5rem 2rem",
        textAlign:"center", position:"relative", overflow:"hidden",
      }}>
        <div style={{
          position:"absolute", inset:0, pointerEvents:"none",
          backgroundImage:"repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(139,26,26,0.06) 18px,rgba(139,26,26,0.06) 19px)",
        }} />
        <div style={{ position:"relative", zIndex:1 }}>
          <div style={{ fontSize:11, color:"#c9a96e", letterSpacing:6, marginBottom:"1rem" }}>
            의열단장 김원봉의 말씀

            fontSize:18, fontWeight:700, color:"#f5ead0",
            lineHeight:2, letterSpacing:1, maxWidth:440, margin:"0 auto",
          }}>
            "당신이 선택한 길을 보았소.<br />
            그 각오의 무게를 나는 압니다."
          </div>
          <div style={{
            marginTop:"1.5rem", display:"inline-block",
            background:"rgba(232,200,106,0.15)", border:"1px solid rgba(232,200,106,0.5)",
            padding:"8px 28px",
          }}>
            <span style={{ fontSize:13, color:"#e8c86a", letterSpacing:4, fontWeight:700 }}>
              {character.title}
            </span>
          </div>
        </div>
      </div>

      {/* Body */}
      <div style={{ padding:"2rem 2.5rem 2.5rem", background:"#f5ead0", position:"relative" }}>
        <div className="paper-lines" />
        <div style={{ position:"relative", zIndex:1 }}>

          {/* Character description */}
          <div className="fade-up" style={{
            fontSize:15, color:"#1a0800", lineHeight:2.1,
            marginBottom:"2rem", padding:"1.2rem 1.4rem",
            background:"rgba(139,26,26,0.06)", borderLeft:"3px solid #8b1a1a",
          }}>
            {character.desc}
          </div>

          {/* Answer recap */}
          <Divider label="당신이 선택한 각오들" />
          <div style={{ display:"flex", flexDirection:"column", gap:"1.2rem", marginBottom:"2rem" }}>
            {QUESTIONS.map((q, i) => {
              const idx = answers[q.id];
              if (idx === null || idx === undefined) return null;
              const opt = q.options[idx];
              return (
                <div key={q.id} className="fade-up" style={{
                  borderBottom:"1px solid rgba(139,105,20,0.2)", paddingBottom:"1.2rem",
                }}>
                  <div style={{ fontSize:11, color:"#8b6914", letterSpacing:3, marginBottom:5 }}>
                    장면 {i+1} — {q.scene.split(". ")[0]}
                  </div>
                  <div style={{ fontSize:14, color:"#2a0e00", lineHeight:1.9, marginBottom:7 }}>
                    "{opt.text}"
                  </div>
                  <div style={{ display:"flex", alignItems:"flex-start", gap:10, flexWrap:"wrap" }}>
                    <span className="weight-tag" style={{
                      background: WEIGHT_COLOR[opt.weight] || "#8b1a1a", fontSize:10, flexShrink:0,
                    }}>
                      {opt.weight}
                    </span>
                    <span style={{ fontSize:12, color:"#5a3a1a", fontStyle:"italic", lineHeight:1.7 }}>
                      {opt.echo}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Reflection */}
          <div style={{
            background:"rgba(26,8,0,0.05)", border:"1px solid rgba(139,105,20,0.3)",
            padding:"1.4rem 1.6rem", marginBottom:"2rem",
          }}>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:4, color:"#8b1a1a", marginBottom:10 }}>
              생각해봅시다
            </div>
            <p style={{ fontSize:14, color:"#2a0e00", lineHeight:2 }}>
              의열단원들의 평균 나이는 <strong>20대 초반</strong>이었습니다. 지금 여러분과 비슷한 나이입니다.
              그들이 목숨을 걸었던 것은 무모함이 아니라,
              그렇게 하지 않으면 안 된다는 깊은 절박함에서 비롯된 것이었습니다.
            </p>
            <p style={{ fontSize:14, color:"#2a0e00", lineHeight:2, marginTop:8 }}>
              오늘 여러분이 느낀 것들 — 두려움, 결의, 그리움, 책임감 —
              이 감정들이 실제로 그들이 느꼈을 것들입니다.
              그 감정의 무게를 기억해 주세요.
            </p>
          </div>

          {/* Final quote */}
          <div style={{
            textAlign:"center", padding:"1.5rem 0",
            borderTop:"1px solid #c9a96e", borderBottom:"1px solid #c9a96e",
            marginBottom:"2rem",
          }}>
            <div style={{
              fontSize:15, fontWeight:700, color:"#8b1a1a",
              letterSpacing:1, lineHeight:2,
            }}>
              "내가 죽은 뒤 30년 후에 조선은 반드시 독립한다."
            </div>
            <div style={{ fontSize:11, color:"#8b6914", marginTop:6, letterSpacing:2 }}>
              — 강우규 의사, 순국 직전 (1920)
            </div>
          </div>

          <div style={{ textAlign:"center" }}>
            <button className="btn-g" onClick={onReset}>
              ↺ 처음부터 다시 체험하기
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   ROOT
───────────────────────────────────────────── */
function App() {
  const [step, setStep] = useState("intro");
  const [qIndex, setQIndex] = useState(0);
  const [answers, setAnswers] = useState({});
  const topRef = useRef(null);

  const scrollTop = () => {
    if (topRef.current) topRef.current.scrollIntoView({ behavior:"smooth" });
  };

  const handleAnswer = (id, idx) => setAnswers(prev => ({ ...prev, [id]: idx }));

  const handleNext = () => {
    if (qIndex < QUESTIONS.length - 1) {
      setQIndex(i => i + 1); scrollTop();
    } else {
      setStep("loading"); scrollTop();
      setTimeout(() => { setStep("result"); scrollTop(); }, 3000);
    }
  };

  const handlePrev = () => {
    if (qIndex > 0) { setQIndex(i => i - 1); scrollTop(); }
  };

  const handleReset = () => {
    setStep("intro"); setQIndex(0); setAnswers({}); scrollTop();
  };

  return (
    <>
      <style>{gStyles}</style>
      <div ref={topRef} style={{
        minHeight:"100vh", background:"#1e1409",
        display:"flex", alignItems:"flex-start", justifyContent:"center",
        padding:"2rem 1rem",
      }}>
        <div style={{
          maxWidth:680, width:"100%", background:"#f5ead0",
          border:"1px solid #8b6914", position:"relative",
          boxShadow:"0 8px 48px rgba(0,0,0,0.75), inset 0 0 80px rgba(139,105,20,0.06)",
        }}>
          <PaperEdge />
          {step === "intro" && <IntroStep onStart={() => { setStep("question"); scrollTop(); }} />}
          {step === "question" && (
            <QuestionStep
              qIndex={qIndex}
              question={QUESTIONS[qIndex]}
              answers={answers}
              onAnswer={handleAnswer}
              onNext={handleNext}
              onPrev={handlePrev}
            />
          )}
          {step === "loading" && <LoadingStep />}
          {step === "result" && <ResultStep answers={answers} onReset={handleReset} />}
          <PaperEdge />
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
